<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Shader Studio</title>
<style>
  :root{
    --sans:"Helvetica Neue",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
    /* neutral grayscale (no hue); both columns share one flat background */
    --bg:#eae9e8; --panel:#eae9e8; --ink:#1a1a1a; --muted:#6c6c6c;
    --line:rgba(0,0,0,.15); --hair:rgba(0,0,0,.07); --inkfill:#1a1a1a;
    --field:transparent; --sel:#f6f5f4; --hud-bg:rgba(234,233,232,.82);
    --ease:cubic-bezier(.2,.8,.2,1);
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --bg:#0f0f0f; --panel:#0f0f0f; --ink:#ededed; --muted:#8a8a8a;
    --line:rgba(255,255,255,.15); --hair:rgba(255,255,255,.07); --inkfill:#ededed;
    --field:transparent; --sel:#0f0f0f; --hud-bg:rgba(15,15,15,.72);
    color-scheme:dark;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{ background:var(--bg); color:var(--ink); font-family:var(--mono); font-size:12px; line-height:1.5;
    display:flex; height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased; }

  /* ---- stage / preview ---- */
  #stage{ flex:1; display:flex; align-items:center; justify-content:center; padding:30px 34px; min-width:0 }
  .canvas-col{ display:flex; flex-direction:column; gap:9px; height:100%; max-height:100% }
  .cap{ display:flex; justify-content:space-between; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted) }
  #canvasWrap{ position:relative; flex:1; min-height:0; aspect-ratio:3/4; border:1px solid var(--line) }
  canvas{display:block; width:100%; height:100%}
  #overlay{position:absolute; inset:0; pointer-events:none; mix-blend-mode:soft-light; background-size:cover; background-position:center; background-repeat:no-repeat}
  .tk{position:absolute; width:9px; height:9px; pointer-events:none}
  .tk-tl{top:-1px;left:-1px;border-top:1px solid var(--ink);border-left:1px solid var(--ink)}
  .tk-tr{top:-1px;right:-1px;border-top:1px solid var(--ink);border-right:1px solid var(--ink)}
  .tk-bl{bottom:-1px;left:-1px;border-bottom:1px solid var(--ink);border-left:1px solid var(--ink)}
  .tk-br{bottom:-1px;right:-1px;border-bottom:1px solid var(--ink);border-right:1px solid var(--ink)}

  /* ---- HUD ---- */
  #hud{ position:absolute; left:0; right:0; bottom:0; display:flex; align-items:center; gap:2px;
    background:var(--hud-bg); -webkit-backdrop-filter:blur(14px) saturate(1.3); backdrop-filter:blur(14px) saturate(1.3);
    border-top:1px solid var(--line); padding:7px 9px; color:var(--ink) }
  #hud button{ background:none; border:none; color:var(--ink); font-family:var(--mono); font-size:10px; letter-spacing:.06em;
    text-transform:uppercase; padding:5px 7px; cursor:pointer; transition:opacity .13s var(--ease), transform .08s var(--ease) }
  #hud button:hover{opacity:.55} #hud button:active{transform:translateY(1px)}
  #hud #play{font-weight:700; letter-spacing:.1em}
  #hud input[type=range]{flex:1; margin:0 8px}
  #tval{width:44px; text-align:right; color:var(--muted); font-size:10px; font-variant-numeric:tabular-nums}

  /* ---- panel ---- */
  #panel{width:384px; flex:none; background:var(--panel); border-left:1px solid var(--line); display:flex; flex-direction:column; height:100%}
  .phead{padding:18px 20px 14px; border-bottom:1px solid var(--line)}
  .phead-top{display:flex; align-items:baseline; justify-content:space-between}
  .brand{display:flex; align-items:baseline; gap:9px}
  .phead h1{font-family:var(--sans); font-size:19px; font-weight:800; letter-spacing:-.02em; text-transform:uppercase; margin:0; line-height:1}
  .brand .mk{font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
  .metaline{display:flex; justify-content:space-between; margin:10px 0 14px; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted)}
  .theme-btn{ background:none; border:1px solid var(--line); color:var(--muted); font-family:var(--mono); font-size:9.5px;
    letter-spacing:.1em; text-transform:uppercase; padding:4px 9px; cursor:pointer;
    transition:color .14s var(--ease), border-color .14s var(--ease), transform .08s var(--ease) }
  .theme-btn:hover{color:var(--ink); border-color:var(--ink)} .theme-btn:active{transform:translateY(1px)}

  .seg{display:flex; border:1px solid var(--line)}
  .seg button{flex:1; background:none; border:none; border-right:1px solid var(--line); color:var(--muted);
    font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; padding:8px; cursor:pointer;
    transition:background .17s var(--ease), color .17s var(--ease), transform .08s var(--ease) }
  .seg button:last-child{border-right:none}
  .seg button:hover{color:var(--ink)} .seg button:active{transform:translateY(1px)}
  .seg button.on{background:var(--ink); color:var(--sel)}

  #rows{overflow-y:auto; flex:1; padding:2px 20px 12px}
  .grp{display:flex; align-items:center; gap:11px; margin:18px 0 3px; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted)}
  .grp::after{content:""; flex:1; height:1px; background:var(--line)}
  .row,.crow{display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--hair)}
  .row > label, .crow > label{width:106px; flex:none; font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted)}
  .spacer{flex:1}

  /* thin-line range */
  input[type=range]{ --p:50%; -webkit-appearance:none; appearance:none; flex:1; height:16px; background:none; cursor:pointer }
  input[type=range]::-webkit-slider-runnable-track{height:1px; background:linear-gradient(var(--inkfill),var(--inkfill)) 0/var(--p) 100% no-repeat, var(--line)}
  input[type=range]::-moz-range-track{height:1px; background:var(--line)}
  input[type=range]::-moz-range-progress{height:1px; background:var(--inkfill)}
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; margin-top:-4px; width:9px; height:9px; border-radius:50%;
    background:var(--inkfill); transition:transform .12s var(--ease) }
  input[type=range]::-moz-range-thumb{ width:9px; height:9px; border:none; border-radius:50%; background:var(--inkfill) }
  input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.4)}
  input[type=range]:active::-webkit-slider-thumb{transform:scale(1.7)}
  input[type=range]:focus-visible{outline:none}

  /* number / hex / select — underline fields */
  .num,.hex,.dur,.ovl select{ background:var(--field); border:none; border-bottom:1px solid var(--line); color:var(--ink);
    font-family:var(--mono); font-size:11px; padding:4px 1px; transition:border-color .14s var(--ease) }
  .num{width:46px; flex:none; text-align:right; font-variant-numeric:tabular-nums}
  .hex{flex:1; text-transform:uppercase; letter-spacing:.04em}
  .num:hover,.hex:hover,.dur:hover,.ovl select:hover{border-color:var(--muted)}
  .num:focus,.hex:focus,.dur:focus,.ovl select:focus{outline:none; border-color:var(--ink)}

  /* color swatch — the only colour in the UI (native appearance kept so the picker opens) */
  input[type=color]{ width:28px; height:20px; flex:none; padding:2px; border:1px solid var(--line); background:var(--panel);
    cursor:pointer; transition:box-shadow .14s var(--ease), transform .1s var(--ease) }
  input[type=color]:hover{box-shadow:0 0 0 2px var(--panel), 0 0 0 3px var(--ink)}
  input[type=color]:active{transform:scale(.92)}
  input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  input[type=color]::-webkit-color-swatch{border:1px solid var(--hair)}
  input[type=color]::-moz-color-swatch{border:none}

  /* custom dropdown (replaces native <select> so the open menu matches the theme) */
  .sel{position:relative; flex:1}
  .sel-btn{ width:100%; display:flex; align-items:center; gap:8px; background:none; border:none; border-bottom:1px solid var(--line);
    color:var(--ink); font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; padding:4px 1px;
    cursor:pointer; transition:border-color .14s var(--ease) }
  .sel-btn .sel-val{flex:1; text-align:left}
  .sel-btn .sel-chev{font-size:8px; color:var(--muted); transition:transform .18s var(--ease)}
  .sel-btn:hover{border-color:var(--muted)} .sel.open .sel-btn{border-color:var(--ink)}
  .sel.open .sel-chev{transform:rotate(180deg)}
  .sel-menu{ position:absolute; left:0; right:0; top:calc(100% + 5px); z-index:40; background:var(--panel); border:1px solid var(--ink);
    opacity:0; transform:translateY(-4px); pointer-events:none; transition:opacity .14s var(--ease), transform .14s var(--ease) }
  .sel.open .sel-menu{opacity:1; transform:none; pointer-events:auto}
  .sel-opt{ padding:7px 9px; font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink);
    cursor:pointer; transition:background .1s var(--ease), color .1s var(--ease) }
  .sel-opt:hover, .sel-opt[aria-selected="true"]{background:var(--ink); color:var(--sel)}

  /* collapsible sections */
  .sec{border-bottom:1px solid var(--hair)}
  .sec-head{ width:100%; display:flex; align-items:center; gap:10px; background:none; border:none; color:var(--muted);
    font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; padding:13px 0 9px; cursor:pointer;
    transition:color .14s var(--ease) }
  .sec-head:hover{color:var(--ink)}
  .sec-head .rule{flex:1; height:1px; background:var(--line)}
  .sec-head .sec-chev{font-size:8px; color:var(--muted); transition:transform .22s var(--ease)}
  .sec.open .sec-chev{transform:rotate(90deg)}
  .sec-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .26s var(--ease)}
  .sec.open > .sec-body{grid-template-rows:1fr}
  .sec-inner{overflow:hidden; min-height:0}

  /* checkbox */
  input[type=checkbox]{ appearance:none; -webkit-appearance:none; width:15px; height:15px; border:1px solid var(--line);
    background:var(--field); cursor:pointer; position:relative; transition:border-color .14s var(--ease), background .14s var(--ease), transform .08s var(--ease) }
  input[type=checkbox]:hover{border-color:var(--ink)}
  input[type=checkbox]:active{transform:scale(.88)}
  input[type=checkbox]:checked{background:var(--ink); border-color:var(--ink)}
  input[type=checkbox]:checked::after{content:""; position:absolute; left:4px; top:1px; width:4px; height:8px; border:solid var(--sel); border-width:0 1.5px 1.5px 0; transform:rotate(45deg)}

  /* overlay section (sibling of #rows so its dropdown menus aren't clipped by the scroll) */
  .ovl-sec{padding:0 20px; border-top:1px solid var(--line)}
  .file{flex:1; background:none; border:1px dashed var(--line); color:var(--muted); font-family:var(--mono); font-size:10px;
    letter-spacing:.05em; text-transform:uppercase; padding:7px; cursor:pointer; text-align:center;
    transition:border-color .14s var(--ease), color .14s var(--ease), transform .08s var(--ease) }
  .file:hover{border-color:var(--ink); color:var(--ink)} .file:active{transform:translateY(1px)}

  /* footer */
  .footer{padding:14px 20px; border-top:1px solid var(--line); display:flex; gap:16px; align-items:center; flex-wrap:wrap}
  .footer button{ background:none; border:none; color:var(--ink); font-family:var(--mono); font-size:10.5px; letter-spacing:.07em;
    text-transform:uppercase; padding:2px 0; cursor:pointer; position:relative; transition:transform .08s var(--ease) }
  .footer button::after{content:""; position:absolute; left:0; right:100%; bottom:-3px; height:1px; background:var(--ink); transition:right .22s var(--ease)}
  .footer button:hover::after{right:0}
  .footer button:active{transform:translateY(1px)}
  .footer label{display:flex; align-items:center; gap:7px; color:var(--muted); font-size:10px; letter-spacing:.06em; text-transform:uppercase}
  .dur{width:38px; text-align:right}
  .tip{color:var(--muted); font-size:10px; line-height:1.6; letter-spacing:.02em; padding:0 20px 16px}
  .tip b{color:var(--ink); font-weight:400; text-decoration:underline; text-underline-offset:2px}

  @media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>
</head>
<body>
  <div id="stage">
    <div class="canvas-col">
      <div id="canvasWrap">
        <canvas id="gl"></canvas>
        <div id="overlay"></div>
        <span class="tk tk-tl"></span><span class="tk tk-tr"></span><span class="tk tk-bl"></span><span class="tk tk-br"></span>
        <div id="hud">
          <button id="play">► Play</button>
          <button id="loop" class="ghost">Loop: on</button>
          <button id="seamless" class="ghost">Seamless: on</button>
          <input id="scrub" type="range" min="0" max="1" step="0.001" value="0" />
          <span id="tval">0.00s</span>
        </div>
      </div>
    </div>
  </div>

  <div id="panel">
    <div class="phead">
      <div class="phead-top">
        <div class="brand"><h1>Cloud Shader</h1><span class="mk">Studio</span></div>
        <button id="themeBtn" class="theme-btn" title="Toggle light / dark">Dark</button>
      </div>
      <div class="seg">
        <button id="tabStart" class="on">Start</button>
        <button id="tabEnd">End</button>
      </div>
    </div>
    <div id="rows"></div>
    <div class="sec open ovl-sec" id="ovlSec">
      <button class="sec-head"><span>Overlay</span><i class="rule"></i><span class="sec-chev">▸</span></button>
      <div class="sec-body"><div class="sec-inner">
        <div class="row"><label>Enable</label><input type="checkbox" id="ovlOn" checked><div class="spacer"></div></div>
        <div class="row"><label>Type</label><div class="sel" id="ovlType"></div></div>
        <div class="row"><label>Blend</label><div class="sel" id="ovlBlend"></div></div>
        <div class="row" id="ovlImgRow" style="display:none"><label>Image</label><label class="file" for="ovlFile" id="ovlFileLabel">Upload image…</label><input type="file" id="ovlFile" accept="image/*" style="display:none"></div>
        <div class="crow" id="ovlC1Row"><label>Grad top</label><input type="color" id="ovlC1"><input type="text" class="hex" id="ovlC1Hex"></div>
        <div class="crow" id="ovlC2Row"><label>Grad bottom</label><input type="color" id="ovlC2"><input type="text" class="hex" id="ovlC2Hex"></div>
        <div class="row" id="ovlAngRow"><label>Angle</label><input type="range" id="ovlAngle" min="0" max="360" step="1"><input type="number" class="num" id="ovlAngleN" min="0" max="360"></div>
        <div class="row"><label>Opacity</label><input type="range" id="ovlOpacity" min="0" max="100" step="1"><input type="number" class="num" id="ovlOpacityN" min="0" max="100"></div>
      </div></div>
    </div>
    <div class="footer">
      <button id="exportBtn">Export</button>
      <button id="importBtn">Import</button>
      <button id="swap">Swap S/E</button>
      <button id="resetBtn">Reset</button>
      <div class="spacer"></div>
      <label>Duration <input id="dur" class="dur" type="number" value="5" step="0.5"> s</label>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none">
    </div>
  </div>

<script>
// ---------- keyframes (your Figma start & end) ----------
const START = {
  cloudColor:'#c35d1d', shadowColor:'#0954a5',
  skyTop:'#a8caeb', skyMid:'#e5b88f', skyBottom:'#ef7851',   // 3-stop sky gradient (Figma)
  coverage:45, density:100, brightness:47, detail:61, variation:9,
  warpAmount:0, warpScale:0, stretch:0,
  phase:0, churn:100, scale:81, offsetX:100, offsetY:50, angle:0,
};
const END = {
  cloudColor:'#c5ac9d', shadowColor:'#00359e',
  skyTop:'#a8caeb', skyMid:'#e5b88f', skyBottom:'#ef7851',
  coverage:45, density:73, brightness:46, detail:32, variation:9,
  warpAmount:0, warpScale:0, stretch:0,
  phase:10, churn:100, scale:81, offsetX:100, offsetY:50, angle:0,
};
const KF = {start:{...START}, end:{...END}};

const PARAMS = [
  {grp:'Colors'},
  {key:'cloudColor',  label:'Cloud color',  type:'color'},
  {key:'shadowColor', label:'Shadow color', type:'color'},
  {key:'skyTop',      label:'Sky 0%',   type:'color'},
  {key:'skyMid',      label:'Sky 50%',  type:'color'},
  {key:'skyBottom',   label:'Sky 100%', type:'color'},
  {grp:'Shape'},
  {key:'coverage',  label:'Coverage'},
  {key:'density',   label:'Density'},
  {key:'brightness',label:'Brightness'},
  {key:'detail',    label:'Detail'},
  {key:'variation', label:'Variation'},
  {grp:'Distortion'},
  {key:'warpAmount',label:'Warp amount'},
  {key:'warpScale', label:'Warp scale'},
  {key:'stretch',   label:'Stretch'},
  {grp:'Motion & Transform'},
  {key:'phase',  label:'Phase',     min:-200, max:200},
  {key:'churn',  label:'Churn',    min:0, max:200},
  {key:'scale',  label:'Scale (R%)',min:10,   max:200},
  {key:'offsetX',label:'Offset X%', min:0,    max:200},
  {key:'offsetY',label:'Offset Y%', min:0,    max:100},
  {key:'angle',  label:'Angle (°)', min:-180, max:180},
];

let editing='start';        // which keyframe the sliders bind to
let animMode=false;         // false = show editing keyframe; true = show timeline t
let playing=false, looping=true, animT=0, startTime=0, seamless=true;

function hexToRgb(h){ return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255]; }
function lerp(a,b,t){ return a+(b-a)*t; }

// ---------- build controls (grouped into collapsible sections) ----------
const rowsEl=document.getElementById('rows');
const els={};
const defaultOpen={ 'Colors':true, 'Shape':true, 'Distortion':false, 'Motion & Transform':false };
let curBody=null;
for(const p of PARAMS){
  if(p.grp){
    const sec=document.createElement('div'); sec.className='sec'+(defaultOpen[p.grp]?' open':'');
    const head=document.createElement('button'); head.className='sec-head';
    const t=document.createElement('span'); t.textContent=p.grp;
    const rule=document.createElement('i'); rule.className='rule';
    const chev=document.createElement('span'); chev.className='sec-chev'; chev.textContent='▸';
    head.append(t, rule, chev);
    const body=document.createElement('div'); body.className='sec-body';
    const inner=document.createElement('div'); inner.className='sec-inner';
    body.appendChild(inner); sec.append(head, body);
    rowsEl.appendChild(sec); curBody=inner; continue;
  }
  if(p.type==='color'){
    const row=document.createElement('div'); row.className='crow';
    const lab=document.createElement('label'); lab.textContent=p.label; row.appendChild(lab);
    const sw=document.createElement('input'); sw.type='color';
    const hex=document.createElement('input'); hex.type='text'; hex.className='hex';
    sw.addEventListener('input',()=>{ KF[editing][p.key]=sw.value; hex.value=sw.value.toUpperCase(); animMode=false; });
    hex.addEventListener('input',()=>{ let v=hex.value.trim(); if(!v.startsWith('#'))v='#'+v;
      if(/^#[0-9a-fA-F]{6}$/.test(v)){ KF[editing][p.key]=v; sw.value=v; animMode=false; } });
    row.appendChild(sw); row.appendChild(hex); curBody.appendChild(row);
    els[p.key]={type:'color',sw,hex};
  } else {
    const min=p.min??0, max=p.max??100;
    const row=document.createElement('div'); row.className='row';
    const lab=document.createElement('label'); lab.textContent=p.label; row.appendChild(lab);
    const sl=document.createElement('input'); sl.type='range'; sl.min=min; sl.max=max; sl.step=1;
    const nm=document.createElement('input'); nm.type='number'; nm.className='num'; nm.min=min; nm.max=max; nm.step=1;
    sl.addEventListener('input',()=>{ KF[editing][p.key]=parseFloat(sl.value); nm.value=sl.value; animMode=false; });
    nm.addEventListener('input',()=>{ let v=parseFloat(nm.value); if(isNaN(v))return; KF[editing][p.key]=v; sl.value=v; animMode=false; });
    row.appendChild(sl); row.appendChild(nm); curBody.appendChild(row);
    els[p.key]={type:'num',sl,nm};
  }
}
// collapse / expand any section header (params + overlay)
document.getElementById('panel').addEventListener('click', e=>{ const h=e.target.closest('.sec-head'); if(h) h.parentElement.classList.toggle('open'); });
// custom dropdown factory (replaces native <select> so the open menu is themed)
function makeSelect(el, opts, onChange, def){
  el.classList.add('sel'); let value = def!=null?def:opts[0].value;
  const btn=document.createElement('button'); btn.type='button'; btn.className='sel-btn';
  const valEl=document.createElement('span'); valEl.className='sel-val';
  const chev=document.createElement('span'); chev.className='sel-chev'; chev.textContent='▾';
  btn.append(valEl, chev);
  const menu=document.createElement('div'); menu.className='sel-menu';
  opts.forEach(o=>{ const d=document.createElement('div'); d.className='sel-opt'; d.textContent=o.label; d.dataset.v=o.value;
    d.addEventListener('click', ev=>{ ev.stopPropagation(); setVal(o.value); el.classList.remove('open'); onChange&&onChange(value); });
    menu.appendChild(d); });
  el.append(btn, menu);
  function setVal(v){ value=v; const o=opts.find(x=>x.value===v); valEl.textContent=o?o.label:v;
    menu.querySelectorAll('.sel-opt').forEach(d=>d.setAttribute('aria-selected', String(d.dataset.v===v))); }
  btn.addEventListener('click', ev=>{ ev.stopPropagation();
    document.querySelectorAll('.sel.open').forEach(s=>{ if(s!==el) s.classList.remove('open'); });
    el.classList.toggle('open'); });
  setVal(value);
  return { el, get value(){return value;}, set value(v){ setVal(v); } };
}
document.addEventListener('click', ()=>document.querySelectorAll('.sel.open').forEach(s=>s.classList.remove('open')));
document.addEventListener('keydown', e=>{ if(e.key==='Escape') document.querySelectorAll('.sel.open').forEach(s=>s.classList.remove('open')); });
function updateTint(){ /* UI kept neutral grayscale — no colour tint */ }
function syncControls(){
  const kf=KF[editing];
  for(const p of PARAMS){ if(p.grp) continue; const e=els[p.key];
    if(e.type==='color'){ e.sw.value=kf[p.key]; e.hex.value=kf[p.key].toUpperCase(); }
    else { e.sl.value=kf[p.key]; e.nm.value=kf[p.key]; fillRange(e.sl); } }
  updateTint();
}

function flash(btn,msg){ const o=btn.textContent; btn.textContent=msg; setTimeout(()=>btn.textContent=o,1100); }
function collectState(){
  return { app:'cloud-shader-studio', version:1, duration:dur(),
    start:{...KF.start}, end:{...KF.end},
    overlay:{ enable:ovlOn.checked, type:ovlType.value, blend:ovlBlend.value,
      c1:ovlState.c1, c2:ovlState.c2, angle:ovlState.angle, opacity:ovlState.opacity, imageUrl:ovlState.imageUrl } };
}
function applyState(s){
  if(s.start) KF.start=Object.assign({...START}, s.start);
  if(s.end)   KF.end  =Object.assign({...END},   s.end);
  if(s.duration!=null) durInp.value=s.duration;
  if(s.overlay){ const o=s.overlay;
    if(o.c1!=null){ ovlState.c1=o.c1; ovlC1.value=o.c1; ovlC1Hex.value=o.c1.toUpperCase(); }
    if(o.c2!=null){ ovlState.c2=o.c2; ovlC2.value=o.c2; ovlC2Hex.value=o.c2.toUpperCase(); }
    if(o.angle!=null){ ovlState.angle=o.angle; ovlAngle.value=o.angle; ovlAngleN.value=o.angle; fillRange(ovlAngle); }
    if(o.opacity!=null){ ovlState.opacity=o.opacity; ovlOpacity.value=o.opacity; ovlOpacityN.value=o.opacity; fillRange(ovlOpacity); }
    if(o.imageUrl!==undefined) ovlState.imageUrl=o.imageUrl;
    if(o.type) ovlType.value=o.type;
    if(o.blend) ovlBlend.value=o.blend;
    if(o.enable!=null) ovlOn.checked=o.enable;
    applyOverlay();
  }
  syncControls();
}

const scrub=document.getElementById('scrub'), tval=document.getElementById('tval');

function dur(){ return (parseFloat(durInp.value)||1); }
function setScrub(v,setT){ animT=Math.min(1,Math.max(0,v)); scrub.value=animT; tval.textContent=(animT*dur()).toFixed(2)+'s'; fillRange(scrub); }
function fillRange(el){ if(!el)return; const mn=+el.min||0, mx=(el.max===''?1:+el.max); const p=(mx-mn)?((+el.value-mn)/(mx-mn)*100):0; el.style.setProperty('--p', p+'%'); }

  if(playing){ startTime=performance.now()-animT*dur()*1000; } };

// ---------- WebGL ----------
const canvas=document.getElementById('gl');
const gl=canvas.getContext('webgl',{antialias:true});
if(!gl){ alert('WebGL not available'); }
const VERT=`attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
const FRAG=`
precision highp float;
uniform vec2  uRes;
uniform vec3  uCloud, uShadow, uSkyTop, uSkyMid, uSkyBot;
uniform float uCoverage, uDensity, uBrightness, uDetail, uVariation;
uniform float uWarpAmt, uWarpScale, uStretch, uPhase, uScale, uChurn, uLayerAlpha;
uniform vec2  uOffset;
uniform float uAngle;

// Based on "2D Clouds" by drift (Shadertoy 4tdSWr) — a mature, well-known 2D cloud shader.
// Simplex noise + rotated-octave fbm; clouds = ridged layer (r) * fbm layer (f); a separate
// noise (c) modulates lit/shadow colour. Motion comes from a per-octave domain offset (flow):
// rotating each octave then re-adding flow decorrelates scales over time, so the field BOTH
// drifts AND the whole form morphs — exactly the Figma video's behaviour.
const mat2 m = mat2(1.6, 1.2, -1.2, 1.6);
vec2 hash(vec2 p){
  p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
  return -1.0 + 2.0*fract(sin(p)*43758.5453123);
}
float noise(vec2 p){
  const float K1 = 0.366025404, K2 = 0.211324865;
  vec2 i = floor(p + (p.x+p.y)*K1);
  vec2 a = p - i + (i.x+i.y)*K2;
  vec2 o = (a.x>a.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
  vec2 b = a - o + K2;
  vec2 c = a - 1.0 + 2.0*K2;
  vec3 h = max(0.5 - vec3(dot(a,a), dot(b,b), dot(c,c)), 0.0);
  vec3 n = h*h*h*h*vec3(dot(a,hash(i+0.0)), dot(b,hash(i+o)), dot(c,hash(i+1.0)));
  return dot(n, vec3(70.0));
}
float fbm(vec2 n){
  float total=0.0, amp=0.1;
  for(int i=0;i<7;i++){ total += noise(n)*amp; n = m*n; amp *= 0.4; }
  return total;
}
void main(){
  vec2 p = gl_FragCoord.xy / uRes.xy;          // 0..1, y up (origin bottom-left)
  float aspect = uRes.x / uRes.y;
  vec2 uv = p * vec2(aspect, 1.0);

  // transform (around center): angle, stretch, offset
  vec2 ctr = vec2(0.5*aspect, 0.5);
  uv -= ctr;
  float a = radians(uAngle);
  uv = mat2(cos(a),-sin(a),sin(a),cos(a)) * uv;
  uv.x *= (1.0 - uStretch*0.7);
  uv += ctr + uOffset;

  // Figma Transform R% -> cloud scale (R 81% ~= drift's default 1.1). Variation = seed shift.
  float cloudscale = max(uScale, 0.05) * 1.35;
  uv = uv * cloudscale + vec2(uVariation*23.1, uVariation*11.7);

  // Motion = 45° diagonal DRIFT (clean translation of the whole field) + adjustable CHURN.
  // flow is the per-phase 45° offset. Applying it once to uv = clean translation. Re-adding
  // uChurn*flow each octave (drift's u=m*u+flow) layers on the churning morph; uChurn=0 gives a
  // pure clean drift, higher = more turbulent churn (uChurn=1 ~= drift's original).
  vec2 flow = uPhase * vec2(0.9, -0.9);   // up-left 45°
  uv += flow;                              // clean 45° drift
  vec2 ch = uChurn * flow;                 // per-octave churn amount

  // base domain warp (Warp amount/scale add an extra fbm distortion)
  float q = fbm(uv*0.5);
  q += uWarpAmt * fbm(uv * mix(0.4, 1.6, clamp(uWarpScale,0.0,1.0)) + 7.0);

  // Detail -> how slowly octave weights decay (more detail = finer structure retained).
  float dt   = clamp(uDetail,0.0,1.0);
  float rdec = mix(0.55, 0.88, dt);
  float fdec = mix(0.46, 0.79, dt);

  // ridged layer (wispy structure)
  float r = 0.0; vec2 u = uv - q; float w = 0.8;
  for(int i=0;i<8;i++){ r += abs(w*noise(u)); u = m*u + ch; w *= rdec; }
  // fbm layer (billowy mass)
  float f = 0.0; u = uv - q; w = 0.7;
  for(int i=0;i<8;i++){ f += w*noise(u); u = m*u + ch; w *= fdec; }
  f *= r + f;
  // colour-modulation layers (advance faster, like drift's time*2 / time*3)
  float c = 0.0; u = uv*2.0 - q; w = 0.4;
  for(int i=0;i<7;i++){ c += w*noise(u); u = m*u + ch*2.0; w *= 0.6; }
  float c1 = 0.0; u = uv*3.0 - q; w = 0.4;
  for(int i=0;i<7;i++){ c1 += abs(w*noise(u)); u = m*u + ch*3.0; w *= 0.6; }
  c += c1;

  // 3-stop sky gradient: top(0%)=uSkyTop, mid(50%)=uSkyMid, bottom(100%)=uSkyBot
  float gt = 1.0 - p.y;                       // 0 at top -> 1 at bottom
  vec3 sky = (gt < 0.5) ? mix(uSkyTop, uSkyMid, gt/0.5)
                        : mix(uSkyMid, uSkyBot, (gt-0.5)/0.5);

  // ---- colour & composite ----
  // Hue base keeps BOTH Figma colours: Shadow(blue) -> Cloud(orange) by lightness L. (drift's
  // own model has no shadow colour, so we keep this mix and borrow only its sky-unification.)
  float bri = clamp(uBrightness,0.0,1.0);
  float clouddark = mix(0.14, 0.42, bri);
  float L = clamp(clouddark + 0.46*c, 0.0, 1.0);
  vec3 cloudcolour = mix(uShadow, uCloud, L);          // blue -> lavender -> orange

  // Brightness wash (steep): low Brightness (Start=47) stays saturated blue-orange; high
  // Brightness (End=72) pales toward warm white so the saturated blue softens to lavender/peach.
  float wash = smoothstep(0.38, 0.82, bri);
  cloudcolour = mix(cloudcolour, vec3(1.0), wash * (0.25 + 0.45*L));

  // drift's sky-unification (as a blend, not additive, so the hues survive): fuses cloud + sky
  // into one soft hazy palette instead of separate over-saturated blobs.
  cloudcolour = mix(cloudcolour, sky, 0.26);

  // cloud amount: Coverage (cloudcover) + Density (cloudalpha)
  float cover = mix(-0.12, 0.55, clamp(uCoverage,0.0,1.0));
  float alpha = mix(2.0, 9.0, clamp(uDensity,0.0,1.0));
  f = cover + alpha*f*r;
  float cloudAmt = clamp(f + c, 0.0, 1.0);

  vec3 result = mix(sky, cloudcolour, cloudAmt);
  gl_FragColor = vec4(result, uLayerAlpha);
}`;
function sh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(o)); return o; }
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 3,-1, -1,3]),gl.STATIC_DRAW);
const ploc=gl.getAttribLocation(prog,'p'); gl.enableVertexAttribArray(ploc);
gl.vertexAttribPointer(ploc,2,gl.FLOAT,false,0,0);
const U={};
['uRes','uCloud','uShadow','uSkyTop','uSkyMid','uSkyBot','uCoverage','uDensity','uBrightness','uDetail',
 'uVariation','uWarpAmt','uWarpScale','uStretch','uPhase','uScale','uChurn','uLayerAlpha','uOffset','uAngle']
 .forEach(n=>U[n]=gl.getUniformLocation(prog,n));

function resize(){
  const r=canvas.getBoundingClientRect();
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const w=Math.max(2,Math.round(r.width*dpr)), h=Math.max(2,Math.round(r.height*dpr));
  if(canvas.width!==w||canvas.height!==h){ canvas.width=w; canvas.height=h; }
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize',resize);

// effective value at time t (lerp start->end)
function vNum(k,t){ return lerp(KF.start[k], KF.end[k], t); }
function vCol(k,t){ const a=hexToRgb(KF.start[k]), b=hexToRgb(KF.end[k]); return [lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)]; }

// Render one layer: params interpolated at `t` (0..1), but Phase passed explicitly so the
// seamless loop can advance it continuously. alpha = layer opacity for crossfade compositing.
function renderLayer(t, phaseVal, alpha){
  gl.uniform2f(U.uRes, canvas.width, canvas.height);
  gl.uniform3fv(U.uCloud,  vCol('cloudColor',t));
  gl.uniform3fv(U.uShadow, vCol('shadowColor',t));
  gl.uniform3fv(U.uSkyTop, vCol('skyTop',t));
  gl.uniform3fv(U.uSkyMid, vCol('skyMid',t));
  gl.uniform3fv(U.uSkyBot, vCol('skyBottom',t));
  gl.uniform1f(U.uCoverage,  vNum('coverage',t)/100);
  gl.uniform1f(U.uDensity,   vNum('density',t)/100);
  gl.uniform1f(U.uBrightness,vNum('brightness',t)/100);
  gl.uniform1f(U.uDetail,    vNum('detail',t)/100);
  gl.uniform1f(U.uVariation, vNum('variation',t)/100);
  gl.uniform1f(U.uWarpAmt,   vNum('warpAmount',t)/100*4.0);
  gl.uniform1f(U.uWarpScale, vNum('warpScale',t)/100);
  gl.uniform1f(U.uStretch,   vNum('stretch',t)/100);
  gl.uniform1f(U.uPhase,     phaseVal*0.10);
  gl.uniform1f(U.uChurn,     vNum('churn',t)/100);
  gl.uniform1f(U.uScale,     vNum('scale',t)/100);
  gl.uniform2f(U.uOffset,    (vNum('offsetX',t)-100)/100, (vNum('offsetY',t)-50)/100);
  gl.uniform1f(U.uAngle,     vNum('angle',t));
  gl.uniform1f(U.uLayerAlpha, alpha);
  gl.drawArrays(gl.TRIANGLES,0,3);
}

let loopS = 0;   // continuous loop progress (advances forever while playing)
function frac(x){ return x - Math.floor(x); }

function frame(now){
  resize();
  const span = (KF.end.phase - KF.start.phase);

  if(playing && seamless){
    // ---- seamless crossfade loop: two copies offset by half a period ----
    // Phase advances CONTINUOUSLY (trajectory unchanged); colours/shape lerp by frac(progress).
    loopS = (now - startTime) / (dur()*1000);
    const sA = frac(loopS), sB = frac(loopS + 0.5);   // two playheads, half-period apart
    const phA = KF.start.phase + sA*span;             // phase RESETS each cycle (so it loops)
    const phB = KF.start.phase + sB*span;
    const wB  = Math.abs(2.0*sA - 1.0);               // 1 when A is at its wrap, 0 mid-cycle
    gl.disable(gl.BLEND);
    renderLayer(sA, phA, 1.0);                     // base
    gl.enable(gl.BLEND);
    gl.blendFuncSeparate(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA, gl.ZERO, gl.ONE); // keep canvas opaque
    renderLayer(sB, phB, wB);                       // crossfaded over base
    gl.disable(gl.BLEND);
    setScrub(sA);
  } else {
    if(playing){
      let nt=(now-startTime)/(dur()*1000);
      if(nt>=1){ if(looping){ startTime=now; nt=0; } else { nt=1; pausUI(); } }
      setScrub(nt);
    }
    const t = animMode ? animT : (editing==='start'?0:1);
    gl.disable(gl.BLEND);
    renderLayer(t, vNum('phase',t), 1.0);
  }
  requestAnimationFrame(frame);
}
// thin-line range fill: keep the ink-filled portion in sync with the value on drag
document.addEventListener('input', e=>{ if(e.target && e.target.type==='range') fillRange(e.target); });
document.querySelectorAll('input[type=range]').forEach(fillRange);

setScrub(0);
requestAnimationFrame(frame);
</script>
